version: "3.8"

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=agent-service
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - APP_PORT=8000
      - AI_PROVIDER=openai
      - AI_MODEL_NAME=gpt-4
      - OTEL_ENDPOINT=http://jaeger:14268/api/traces
      - OTEL_SERVICE_NAME=agent-service
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
    depends_on:
      - jaeger
      - redis
      - rabbitmq
    volumes:
      - ./custom/src/prompts:/home/app/custom/src/prompts:ro
    networks:
      - agent-network

  agent-dapr:
    image: "daprio/daprd:latest"
    command:
      [
        "./daprd",
        "-app-id",
        "agent-service",
        "-app-port",
        "8000",
        "-dapr-http-port",
        "3500",
        "-dapr-grpc-port",
        "50001",
        "-components-path",
        "/components",
        "-config",
        "/config/config.yaml",
      ]
    volumes:
      - "./dapr/components:/components"
      - "./dapr/config:/config"
    depends_on:
      - agent
      - redis
      - rabbitmq
    network_mode: "service:agent"

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    networks:
      - agent-network

  rabbitmq:
    image: "rabbitmq:3-management-alpine"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - agent-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
