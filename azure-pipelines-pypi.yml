trigger:
  branches:
    include:
      - master
      - dev
      - feature/pypi
  paths:
    exclude:
      - azure-pipelines-pypi.yml

variables:
  - name: pythonVersion
    value: "3.13"
  - name: packagePath
    value: "base"

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: Test
    displayName: "Test"
    jobs:
      - job: TestPackage
        displayName: "Run tests"
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
              addToPath: true
            displayName: "Use Python $(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install -e ".[dev]"
              pip install pytest-cov
            workingDirectory: "$(packagePath)"
            displayName: "Install dependencies"

          - script: |
              python -m pytest --cov=base.src --cov-report=xml --cov-report=html
            workingDirectory: "$(packagePath)"
            displayName: "Run tests with coverage"

          - task: PublishPipelineArtifact@1
            condition: succeeded()
            inputs:
              targetPath: "$(Build.SourcesDirectory)/$(packagePath)/coverage.xml"
              artifact: "CodeCoverageXML"
              publishLocation: "pipeline"
            displayName: "Publish coverage XML"

          - task: PublishPipelineArtifact@1
            condition: succeeded()
            inputs:
              targetPath: "$(Build.SourcesDirectory)/$(packagePath)/htmlcov"
              artifact: "CodeCoverageHTML"
              publishLocation: "pipeline"
            displayName: "Publish coverage HTML report"

  - stage: Build
    displayName: "Build Package"
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BuildPackage
        displayName: "Build Python package"
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
              addToPath: true
            displayName: "Use Python $(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install -e ".[dev]"
            workingDirectory: "$(packagePath)"
            displayName: "Install build dependencies"

          - script: |
              python -m build
            workingDirectory: "$(packagePath)"
            displayName: "Build package"

          - task: CopyFiles@2
            inputs:
              SourceFolder: "$(packagePath)/dist"
              Contents: "*"
              TargetFolder: "$(Build.ArtifactStagingDirectory)"
            displayName: "Copy package artifacts"

          - publish: "$(Build.ArtifactStagingDirectory)"
            artifact: "base-dist"
            displayName: "Publish package artifacts"

  - stage: Publish
    displayName: "Publish Package"
    dependsOn: Build
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/master'), eq(variables['Build.SourceBranch'], 'refs/heads/pypi-master')))
    jobs:
      - job: PublishPackage
        displayName: "Publish to PyPI"
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
              addToPath: true
            displayName: "Use Python $(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install -e ".[dev]"
            workingDirectory: "$(packagePath)"
            displayName: "Install publication tooling"

          - script: |
              git config user.email "ci-bot@bechtle.com"
              git config user.name "CI Bot"
              python scripts/bump_version.py
            displayName: "Bump version"

          - script: |
              rm -rf dist
              python -m build
            workingDirectory: "$(packagePath)"
            displayName: "Rebuild package for publish"
          - task: TwineAuthenticate@1
            inputs:
              artifactFeed: BIoS
            displayName: "Authenticate with Azure Artifacts"

          - script: |
              python -m pip install --upgrade pip
              pip install twine
              python -m twine upload -r BIoS --config-file $(PYPIRC_PATH) $(Build.SourcesDirectory)/$(packagePath)/dist/*
            displayName: "Upload package to Azure Artifacts"

          - script: |
              python -m pip install --upgrade pip
              pip install twine
              python -m twine upload -r BIoS --config-file $(PYPIRC_PATH) $(Build.SourcesDirectory)/$(packagePath)/dist/*
            displayName: "Upload package to Azure Artifacts"
