name: $(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)_$(Rev:rrrr)

variables:
  - name: pythonVersion
    value: "3.13"
  - name: packagePath
    value: "."
  - name: coverageModule
    value: "blueprint.agents"

trigger:
  branches:
    include:
      - master
      - develop
      - feature/*
  tags:
    include:
      - v*
  paths:
    exclude:
      - azure-pipelines-pypi.yml
      - "**/*.md"
      - "docs/**"

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: Test
    displayName: "Test Package"
    jobs:
      - job: TestPackage
        displayName: "Run Tests and Coverage"
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - template: build-and-publish-pypi.yml
            parameters:
              pythonVersion: $(pythonVersion)
              packagePath: $(packagePath)
              coverageModule: $(coverageModule)
              testPath: "tests"
              runTests: true
              publishCoverage: true
              publishToFeed: false

  - stage: Build
    displayName: "Build Package"
    dependsOn: Test
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    jobs:
      - job: BuildPackage
        displayName: "Build Python package"
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - template: build-and-publish-pypi.yml
            parameters:
              pythonVersion: $(pythonVersion)
              packagePath: $(packagePath)
              runTests: false
              publishCoverage: false
              publishToFeed: true
              feedName: "BIoS"
              projectName: "Bechtle-Index-of-Sovereignty"
