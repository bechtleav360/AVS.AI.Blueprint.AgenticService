
name: $(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)_$(Rev:rrrr)

variables:
  - name: pythonVersion
    value: '3.13'
  - name: packagePath
    value: 'base'
  - name: coverageModule
    value: 'agents.base'

trigger:
  branches:
    include:
      - master
      - dev
      - feature/*
  tags:
    include:
      - v*
  paths:
    exclude:
      - azure-pipelines-pypi.yml
      - '**/*.md'
      - 'docs/**'

resources:
  repositories:
    - repository: templates
      type: git
      name: PipelineTemplates

pool:
  vmImage: 'ubuntu-latest'

stages:
  # Test Stage - läuft immer auf allen Branches und Tags
  - stage: Test
    displayName: 'Test Package'
    jobs:
      - job: TestPackage
        displayName: 'Run Tests and Coverage'
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - template: build-and-publish-pypi.yml@templates
            parameters:
              pythonVersion: $(pythonVersion)
              packagePath: $(packagePath)
              coverageModule: $(coverageModule)
              runTests: true
              publishCoverage: true
              publishToFeed: false

  # Build and Publish Stage - läuft nach erfolgreichen Tests
  # Publiziert Release-Versionen (bei Tags) oder Beta-Versionen (bei Branches)
  - stage: BuildAndPublish
    displayName: 'Build and Publish Package'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: PublishPackage
        displayName: 'Build and Publish to Azure Artifacts'
        steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - template: build-and-publish-pypi.yml@templates
            parameters:
              pythonVersion: $(pythonVersion)
              packagePath: $(packagePath)
              runTests: false
              publishToFeed: true
