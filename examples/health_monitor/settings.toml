[default]
app_name = "Health Monitor"
app_port = 8000
app_environment = "development"
log_level = "INFO"

[default.monitor]
check_timeout_seconds = 10
degradation_threshold = 0.95
alert_consecutive_failures = 3

[default.monitor.endpoints]
httpbin = { url = "https://httpbin.org/status/200", interval_seconds = 60 }
jsonplaceholder = { url = "https://jsonplaceholder.typicode.com/posts/1", interval_seconds = 120 }

[default.cache]
cache_dir = ".cache/health-monitor"
size_limit = 200000000
default_ttl = 86400
