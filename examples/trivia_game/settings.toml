[default]
# Application settings
app_name = "Trivia Game"
app_version = "0.1.0"
app_description = "A trivia game using LLM and Blueprint Agents framework"
debug = true

# AI Agent Configuration
ai_model_provider = "vllm"
ai_model_base_url = "https://avs-vllm.q14.net/v1"
ai_model_name = "default"
# ai_model_api_key = "" # set in environment variable
ai_model_max_tokens = 500
ai_model_temperature = 0.1

[default.server]
host = "0.0.0.0"
port = 8000
reload = true

[default.logging]
level = "DEBUG"
format = "json"

[default.observability]
otel_enabled = false              # Usage still logged
token_metrics_enabled = true      # Usage still logged


[default.game]
# Number of questions per game
questions_per_game = 5
# Difficulty level: easy, medium, hard
difficulty = "medium"

# ============================================================================
# Trivia Master Agent Configuration
# ============================================================================

[default.runtimes.trivia_master]
# LLM model configuration
model_provider = "openai"
model_name = "gpt-4o-mini"
# model_api_key = "@format {env[OPENAI_API_KEY]}"  # Set OPENAI_API_KEY environment variable
# Prompt configuration
prompt_directory = "src/prompts"
system_prompt_name = "system"
