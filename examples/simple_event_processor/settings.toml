[default]
# Application settings
app_name = "Simple Event Processor"
app_version = "0.1.0"
app_description = "A minimal event processor using Blueprint Agents framework"
debug = true

[default.server]
host = "0.0.0.0"
port = 8000
reload = true

[default.logging]
level = "INFO"
format = "json"

[default.event_publishing]
enabled = false
# Event publishing configuration would go here if needed

[default.observability]
otel_enabled = false
# OpenTelemetry configuration would go here if needed
