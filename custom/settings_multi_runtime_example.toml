# Example configuration for multiple agent runtimes
# Copy relevant sections to your settings.toml to enable multiple runtimes

[default]
app_name = "agent_blueprint"
app_port = 8000
app_environment = "development"

log_level = "INFO"
log_format = "json"

# Global AI defaults (used as fallback for all runtimes)
ai_model_provider = "vllm"
ai_model_base_url = "https://avs-vllm.q14.net/v1"
# ai_model_api_key = "" # set in environment variable or secrets.toml
ai_model_max_tokens = 1000
ai_model_temperature = 0.1

# Global usage limits (can be overridden per runtime)
ai_usage_request_limit = 10
ai_usage_input_tokens_limit = 6000
ai_usage_output_tokens_limit = 4000
ai_usage_total_tokens_limit = 10000

[development]
log_level = "DEBUG"

# ============================================================================
# Runtime-specific configurations
# Each [runtime.{name}] section defines a separate agent runtime instance
# ============================================================================

# Default runtime - used when no specific runtime is requested
[runtime.default]
system_prompt_name = "system"
instruction_prompt_name = "instruction"
ai_model_name = "default"
ai_model_temperature = 0.1

# Invoice analyzer runtime - specialized for invoice processing
[runtime.invoice_analyzer]
system_prompt_name = "invoice_system"
instruction_prompt_name = "invoice_instruction"
ai_model_name = "invoice-specialized-model"
ai_model_temperature = 0.1
ai_model_max_tokens = 2000
# Higher limits for complex invoice processing
ai_usage_input_tokens_limit = 8000
ai_usage_output_tokens_limit = 6000

# Document classifier runtime - fast classification with minimal tokens
[runtime.document_classifier]
system_prompt_name = "classifier_system"
instruction_prompt_name = "classifier_instruction"
ai_model_provider = "openai"  # Can override provider per runtime
ai_model_name = "gpt-4"
ai_model_temperature = 0.0  # Deterministic for classification
ai_model_max_tokens = 500  # Short responses
# Lower limits for quick classification
ai_usage_input_tokens_limit = 2000
ai_usage_output_tokens_limit = 1000

# Summarizer runtime - quick summaries with higher creativity
[runtime.summarizer]
system_prompt_name = "summarizer_system"
instruction_prompt_name = "summarizer_instruction"
ai_model_name = "fast-model"
ai_model_temperature = 0.7  # More creative
ai_model_max_tokens = 1500
ai_concurrent_requests = 3  # Allow more concurrent requests

# Validator runtime - strict validation with low temperature
[runtime.validator]
system_prompt_name = "validator_system"
instruction_prompt_name = "validator_instruction"
ai_model_name = "default"
ai_model_temperature = 0.0  # Deterministic
ai_model_max_tokens = 800

# Multi-language runtime example - German language processing
[runtime.german_analyzer]
system_prompt_name = "system_de"
instruction_prompt_name = "instruction_de"
prompt_directory = "/etc/agent/prompts/de"  # Language-specific prompt directory
ai_model_name = "multilingual-model"
ai_model_temperature = 0.1

[testing]
log_level = "DEBUG"
# Test runtimes can have different configs
[runtime.test_runtime]
system_prompt_name = "test_system"
ai_model_name = "test-model"

[production]
log_level = "INFO"
# Production runtimes with production models
[runtime.invoice_analyzer]
ai_model_name = "production-invoice-model"
prompt_directory = "/etc/agent/prompts"
