[default]
app_port = 8000
app_environment = "development"

log_level = "INFO"
log_format = "json"

# Prompt Configuration
# In Kubernetes, prompts are mounted at /etc/agent/prompts from ConfigMap
# For multiple paths, use comma-separated string or set via environment
prompt_search_paths = "/etc/agent/prompts"

# Data Gateway Configuration
data_gateway_base_url = "http://localhost:8001"
data_gateway_timeout_s = 30
retry_max_attempts = 3
retry_backoff_factor = 2

# Dapr Configuration
dapr_pubsub_name = "rabbitmq-pubsub"
dapr_http_port = 3500
dapr_grpc_port = 50001

# Event Publishing Configuration (defaults for all environments)
[default.event_publishing]
default_pubsub_name = "rabbitmq-pubsub"
topic_mapping = {'asset-harmonized-v1'='dev.asset.harmonized.v1'}

#[default.event_publishing.topic_mapping]
#"asset.harmonized" = { topic = "asset.events", routing_key = "harmonized" }
#"asset.not_harmonized" = { topic = "asset.events", routing_key = "not_harmonized" }
#"asset.harmonization.error" = { topic = "asset.events", routing_key = "error" }

# RabbitMQ Configuration
rabbitmq_host = "localhost:5672"
rabbitmq_vhost = "bios"

# Health Check Configuration
health_check_ai_provider = true
health_check_rabbitmq = true

# Circuit Breaker Configuration
circuit_breaker_failure_threshold = 5
circuit_breaker_timeout_s = 60

# Cache Configuration
cache_ttl_seconds = 3600
cache_max_size = 10000



[development]
app_name = "agent_blueprint"
app_port = 8000
app_environment = "development"
log_level = "DEBUG"
data_gateway_base_url = "http://localhost:8001"

## FIXME: support different ai configurations for different agents

# AI Agent Configuration
ai_model_provider = "vllm"
ai_model_base_url = "https://avs-vllm.q14.net/v1"
ai_model_name = "default"
# ai_model_api_key = "" # set in environment variable
ai_model_max_tokens = 1000
ai_model_temperature = 0.1

# vLLM-specific: Use tool_choice="auto" instead of "required"
# Some vLLM models (e.g., Qwen3-32B-AWQ) don't support tool_choice="required"
# Set to true to use flexible tool calling (recommended for compatibility)
ai_model_use_flexible_tool_choice = true

# AI Usage Limits (per agent run)
ai_concurrent_requests = 1
ai_usage_request_limit = 10
ai_usage_input_tokens_limit = 6000
ai_usage_output_tokens_limit = 4000
ai_usage_total_tokens_limit = 10000

[testing]
app_name = "agent_blueprint"
app_port = 8000
app_environment = "testing"
log_level = "DEBUG"
data_gateway_base_url = "http://localhost:8001"
cache_ttl_seconds = 60

[production]
app_name = "agent_blueprint"
app_port = 8000
app_environment = "production"
log_level = "INFO"
# Production values should come from environment variables or secret stores

# Runtime-specific configurations
# Override AI settings per agent runtime if needed


[runtime.asset_harmonizing]
# Configuration for the harmonizing agent
# Harmonizing may need different settings (e.g., higher token limits)
ai_model_max_tokens = 2000
ai_model_temperature = 0.0
ai_usage_output_tokens_limit = 6000
ai_usage_total_tokens_limit = 15000
