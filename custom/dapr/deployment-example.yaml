# Complete Kubernetes deployment example with Dapr
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-blueprint
  labels:
    app: agent-blueprint
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-blueprint
  template:
    metadata:
      labels:
        app: agent-blueprint
      annotations:
        # Enable Dapr sidecar
        dapr.io/enabled: "true"
        
        # Dapr app ID (must match scopes in subscriptions)
        dapr.io/app-id: "agent-blueprint"
        
        # Application port
        dapr.io/app-port: "8000"
        
        # Dapr HTTP port
        dapr.io/http-port: "3500"
        
        # Dapr gRPC port
        dapr.io/grpc-port: "50001"
        
        # Dapr metrics port
        dapr.io/metrics-port: "9090"
        
        # Log level (debug, info, warn, error)
        dapr.io/log-level: "info"
        
        # Enable profiling
        dapr.io/enable-profiling: "false"
        
        # API token authentication
        dapr.io/enable-api-logging: "true"
        
        # Max request body size (in MB)
        dapr.io/http-max-request-size: "4"
        
        # Read buffer size (in KB)
        dapr.io/http-read-buffer-size: "4"
        
        # Enable metrics
        dapr.io/enable-metrics: "true"
        
        # Sidecar CPU limit
        dapr.io/sidecar-cpu-limit: "1000m"
        
        # Sidecar memory limit
        dapr.io/sidecar-memory-limit: "512Mi"
        
        # Sidecar CPU request
        dapr.io/sidecar-cpu-request: "100m"
        
        # Sidecar memory request
        dapr.io/sidecar-memory-request: "256Mi"
    spec:
      containers:
      - name: agent-blueprint
        image: your-registry/agent-blueprint:latest
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        
        env:
        # Application environment
        - name: ENVIRONMENT
          value: "production"
        
        # AI Model configuration from secrets
        - name: AI_MODEL_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-model-secret
              key: openai_api_key
        
        - name: AI_MODEL_BASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-model-secret
              key: vllm_base_url
              optional: true
        
        # Data Gateway configuration
        - name: DATA_GATEWAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: data-gateway-secret
              key: api_key
              optional: true
        
        # Observability
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        
        - name: OTEL_SERVICE_NAME
          value: "agent-blueprint"
        
        # Python settings
        - name: PYTHONUNBUFFERED
          value: "1"
        
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        volumeMounts:
        # Mount prompts from ConfigMap
        - name: prompts
          mountPath: /etc/agent/prompts
          readOnly: true
        
        # Mount settings
        - name: settings
          mountPath: /app/custom/settings.toml
          subPath: settings.toml
          readOnly: true
      
      volumes:
      # Prompts ConfigMap
      - name: prompts
        configMap:
          name: agent-prompts
      
      # Settings ConfigMap
      - name: settings
        configMap:
          name: agent-settings

---
apiVersion: v1
kind: Service
metadata:
  name: agent-blueprint
  labels:
    app: agent-blueprint
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 3500
    targetPort: 3500
    protocol: TCP
    name: dapr-http
  - port: 50001
    targetPort: 50001
    protocol: TCP
    name: dapr-grpc
  selector:
    app: agent-blueprint

---
# ConfigMap for prompts
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-prompts
data:
  invoice_system.prompt: |
    You are an AI assistant specialized in invoice processing.
    Extract structured information from unstructured invoice text.
    Be precise and accurate with numbers and dates.
  
  invoice_instruction.prompt: |
    Analyze this invoice and extract the information:
    
    {invoice_text}
    
    Extract:
    - Invoice number and date
    - Customer information
    - Line items with quantities and prices
    - Totals and tax amounts
  
  classifier_system.prompt: |
    You are a document classifier.
    Categorize documents accurately and quickly.

---
# ConfigMap for settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-settings
data:
  settings.toml: |
    [production]
    app_name = "agent-blueprint"
    app_port = 8000
    log_level = "INFO"
    
    # Prompt configuration
    prompt_directory = "/etc/agent/prompts"
    
    # AI Model
    ai_model_provider = "openai"
    ai_model_name = "gpt-4"
    ai_model_max_tokens = 2000
    ai_model_temperature = 0.1
    
    # Multi-runtime configuration
    [runtime.invoice_analyzer]
    system_prompt_name = "invoice_system"
    instruction_prompt_name = "invoice_instruction"
    ai_model_temperature = 0.1
    
    [runtime.document_classifier]
    system_prompt_name = "classifier_system"
    ai_model_temperature = 0.0

---
# HorizontalPodAutoscaler for auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-blueprint-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-blueprint
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
