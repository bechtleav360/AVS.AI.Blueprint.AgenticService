apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: rabbitmq-pubsub
spec:
  type: pubsub.rabbitmq
  version: v1
  metadata:
    # RabbitMQ connection
    - name: host
      value: "amqp://localhost:5672"
    
    # Virtual host
    - name: vhost
      value: "bios"
    
    # Consumer ID
    - name: consumerID
      value: "agent-blueprint"
    
    # Durable exchanges and queues
    - name: durable
      value: "true"
    
    # Delete when unused
    - name: deleteWhenUnused
      value: "false"
    
    # Auto-ack messages
    - name: autoAck
      value: "false"
    
    # Delivery mode (1=non-persistent, 2=persistent)
    - name: deliveryMode
      value: "2"
    
    # Reconnect wait time in seconds
    - name: reconnectWait
      value: "5"
    
    # Prefetch count
    - name: prefetchCount
      value: "10"
    
    # Exchange kind (topic, fanout, direct, headers)
    - name: exchangeKind
      value: "topic"
    
    # Enable publisher confirms
    - name: publisherConfirm
      value: "true"
    
    # TLS configuration (optional)
    # - name: clientCert
    #   value: "/path/to/cert.pem"
    # - name: clientKey
    #   value: "/path/to/key.pem"
    # - name: caCert
    #   value: "/path/to/ca.pem"
  
  # Authentication using Kubernetes secrets
  auth:
    secretStore: kubernetes
  
  # Scopes - which apps can use this component
  scopes:
    - agent-blueprint

---
# Alternative: RabbitMQ with authentication from secrets
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: rabbitmq-pubsub-secure
spec:
  type: pubsub.rabbitmq
  version: v1
  metadata:
    - name: host
      secretKeyRef:
        name: rabbitmq-secret
        key: host
    
    - name: vhost
      value: "bios"
    
    - name: consumerID
      value: "agent-blueprint"
    
    - name: durable
      value: "true"
    
    - name: autoAck
      value: "false"
    
    - name: deliveryMode
      value: "2"
    
    - name: prefetchCount
      value: "10"
    
    - name: exchangeKind
      value: "topic"
  
  auth:
    secretStore: kubernetes
