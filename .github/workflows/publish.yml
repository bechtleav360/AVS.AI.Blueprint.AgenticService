name: Publish

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-env

      - name: Run unit tests
        run: python -m pytest tests/unit -v --tb=short

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    outputs:
      release_type: ${{ steps.release.outputs.type }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Extract version and determine release target
        id: release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+a[0-9]+$ ]]; then
            echo "type=alpha" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "Release type: alpha -> TestPyPI"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+b[0-9]+$ ]]; then
            echo "type=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "Release type: beta -> TestPyPI"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "type=stable" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "Release type: stable -> PyPI"
          else
            echo "ERROR: Tag '$VERSION' does not match expected format (e.g. 0.5.0, 0.5.0a1, 0.5.0b1)"
            exit 1
          fi

      - name: Set version in pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.release.outputs.version }}"/' pyproject.toml
          grep '^version' pyproject.toml

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Store build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      # Make release metadata available to downstream jobs via an artifact
      - name: Store release metadata
        run: |
          echo "type=${{ steps.release.outputs.type }}" > release-meta.env
          echo "tag=${{ steps.release.outputs.tag }}" >> release-meta.env
          echo "version=${{ steps.release.outputs.version }}" >> release-meta.env
          echo "prerelease=${{ steps.release.outputs.prerelease }}" >> release-meta.env

      - name: Store release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-meta
          path: release-meta.env

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    # Only alpha and beta releases go to TestPyPI
    if: needs.build.outputs.release_type == 'alpha' || needs.build.outputs.release_type == 'beta'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/avs-blueprint-agents
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Only stable releases (X.Y.Z with no pre-release suffix) go to PyPI
    if: needs.build.outputs.release_type == 'stable'
    environment:
      name: pypi
      url: https://pypi.org/p/avs-blueprint-agents
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-testpypi
      - publish-pypi
    # Run when build succeeded and at least one publish job succeeded or was skipped
    if: always() && needs.build.result == 'success' && (needs.publish-testpypi.result == 'success' || needs.publish-pypi.result == 'success')
    permissions:
      contents: write  # required to create GitHub releases

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-meta

      - name: Load release metadata
        id: meta
        run: |
          cat release-meta.env >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: dist/*
          generate_release_notes: true
