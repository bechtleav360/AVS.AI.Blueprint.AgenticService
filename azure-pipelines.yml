# ASP.NET Core
# Build and test ASP.NET Core projects targeting .NET Core.
# Add steps that run tests, create a NuGet package, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

name: $(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)_$(Rev:rrrr)

variables:
  - group: Docker Bios
  - name: buildConfiguration
    value: 'Release'
  - name: buildRevision
    value: $[counter(format('{0}-{1}', variables['Build.Repository.Name'], variables['Build.SourceBranchName']), 1)]
  # Helm
  - name: chartPath
    value: deploy/charts
  - name: chartName
    value: bios-agents-blueprint
  # Service
  - name: projectLocation
    value: .
  - name: containerName
    value: bios-agents-blueprint
  - name: projectFilePath
    value: custom/pyproject.toml

trigger:
  branches:
    include:
      - master
  paths:
    exclude:
      - azure-pipelines.yml

resources:
  repositories:
    - repository: templates
      type: git
      name: PipelineTemplates

stages:
  - stage: Build
    jobs:
      - job: Docker
        pool: 'Docker'
        steps:
          - template: extract-version-info.yml@templates
            parameters:
              projectFilePath: ${{ variables.projectFilePath }}
              buildRevision: $(buildRevision)

            # build Service
          - template: build-project-container.yaml@templates
            parameters:
              projectLocation: '$(Build.SourcesDirectory)/$(projectLocation)'
              containerName: '$(containerRepo)/$(containerName)'

          #   # build Helm
          # - template: build-helm-chart.yaml@templates
          #   parameters:
          #     projectFilePath: '$(Build.SourcesDirectory)/$(projectLocation)/$(projectFile)'
          #     chartBasePath: $(chartPath)
          #     chartName: $(chartName)
