{{- if .Values.dapr.enabled }}
{{- if .Values.dapr.useCRDs }}
{{- range $name, $subscription := .Values.subscriptions }}
{{- if $subscription.enabled }}
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: {{ include "agent-blueprint.fullname" $ }}-{{ $name | kebabcase }}
  labels:
    {{- include "agent-blueprint.labels" $ | nindent 4 }}
spec:
  topic: {{ $subscription.topic }}
  routes:
    default: {{ $subscription.route }}
  pubsubname: {{ $subscription.pubsubname | default "pubsub" }}
  {{- if $subscription.deadLetterTopic }}
  deadLetterTopic: {{ $subscription.deadLetterTopic }}
  {{- end }}
  {{- if $subscription.metadata }}
  metadata:
    {{- toYaml $subscription.metadata | nindent 4 }}
  {{- end }}
  scopes:
    - {{ $.Values.dapr.appId }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
