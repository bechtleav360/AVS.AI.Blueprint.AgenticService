apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-blueprint.fullname" . }}-settings
  labels:
    {{- include "agent-blueprint.labels" . | nindent 4 }}
data:
  # DYNACONF_ prefixed environment variables for app settings
  {{- range $key, $value := .Values.appSettings }}
  DYNACONF_{{ $key | upper }}: {{ $value | quote }}
  {{- end }}
  
  # DYNACONF_ prefixed environment variables for runtime configurations
  {{- range $runtimeName, $runtimeConfig := .Values.runtimes }}
  {{- if $runtimeConfig.enabled }}
  {{- $runtimeKey := include "agent-blueprint.toEnvKey" $runtimeName }}
  {{- range $settingKey, $settingValue := $runtimeConfig }}
  {{- if ne $settingKey "enabled" }}
  {{- $envKey := include "agent-blueprint.toEnvKey" $settingKey }}
  DYNACONF_RUNTIME__{{ $runtimeKey }}__{{ $envKey }}: {{ $settingValue | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  
  # Event publishing configuration
  DYNACONF_EVENT_PUBLISHING__DEFAULT_PUBSUB_NAME: {{ .Values.eventPublishing.defaultPubsubName | quote }}
  {{- range $eventType, $topic := .Values.eventPublishing.topicMapping }}
  DYNACONF_EVENT_PUBLISHING__TOPIC_MAPPING__{{ $eventType | replace "." "_" | upper }}: {{ $topic | quote }}
  {{- end }}
