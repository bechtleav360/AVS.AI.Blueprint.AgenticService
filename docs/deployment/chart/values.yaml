# Default values for agent-blueprint
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.harbor.av360.org/bechtle-ios/bios-harmonizing-agent
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Dapr configuration (using Dapr operator for automatic sidecar injection)
dapr:
  enabled: true
  appId: bios-harmonizing-agent
  appPort: 8000
  logLevel: info
  enableApiLogging: true
  enableMetrics: true
  metricsPort: 9090

  # Sidecar resource limits
  sidecar:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

# Application settings - will be converted to DYNACONF_ prefixed environment variables
appSettings:
  # Application
  app_name: "bios-harmonizing-agent"
  app_port: 8000
  log_level: "DEBUG"
  app_environment: "development"

  # AI Model
  ai_model_provider: "vllm"
  ai_model_name: "default"
  ai_model_base_url: "https://avs-vllm.q14.net/v1"
  ai_model_api_key: "6FEDGzTQd8Oea8OO4onA" # Set this to your actual API key
  ai_model_max_tokens: 3000
  ai_model_temperature: 0.1
  ai_model_timeout: 60
  ai_model_max_retries: 3

  # Observability
  otel_enabled: true
  otel_endpoint: "http://otel-collector.dev-bios-bechtle.svc:4317"
  otel_service_name: "bios-harmonizing-agent"

  # Data Gateway
  data_gateway_enabled: false
  data_gateway_base_url: ""
  data_gateway_timeout: 30
  data_gateway_max_retries: 3

  # RabbitMQ
  rabbitmq_host: "rabbitmq.dev-bios-bechtle.svc:5672"
  rabbitmq_vhost: "bios"

  # Health checks
  health_check_ai_provider: true
  health_check_rabbitmq: true

  # Prompt Configuration
  # Prompts are mounted from ConfigMap at /etc/agent/prompts
  # Using comma-separated string for Dynaconf compatibility
  prompt_search_paths: "/etc/agent/prompts"

# Agent configurations - each agent built with AgentBuilder in main.py
# These settings map to [runtime.{agent_name}] in settings.toml
agents:
  # harmonizing analyzer agent
  asset_harmonizing:
    model_name: "default"
    temperature: 0.1
    max_tokens: 2000
    timeout: 60
    max_retries: 3

# Prompts configuration - each key becomes a .prompt file in the ConfigMap
# System prompts define the agent's role (used with .with_system_prompt_file())
# Instruction prompts are templates for specific tasks (used with PromptLoader.load_instruction_prompt())
prompts:
  # System prompt for harmonizing_analyzer agent
  # Referenced in main.py: .with_system_prompt_file("harmonizing_analyzer")
  asset_harmonizing: |
    You are an expert in asset data harmonization.

    Your task is to map the provided input JSON to the canonical Asset schema.

    STRICT RULES (must follow without exception):

    1. Type constraints:
      - Only accept assets of type 'hardware' or 'software'
      - Do not output other types
      - If unsure about the type, leave it null

    2. Mandatory null fields (per after-harmonizing specification):
      - id: MUST be null
      - externalId: MUST be null
      - tags: MUST be null
      - references: MUST be null

    3. Status field:
      - MUST always be set to 'draft'

    4. Schema compliance:
      - Use only the schema fields defined by the Asset model
      - No extra fields allowed
      - Do not hallucinate values
      - If data is missing, leave fields null

    5. Type-specific rules:
      - If input indicates 'Hardware':
        * Set Asset.type = 'hardware'
        * Populate the 'hardware' extension
        * Leave 'software' extension null
      - If input indicates 'Software':
        * Set Asset.type = 'software'
        * Populate the 'software' extension
        * Leave 'hardware' extension null

    6. Field mapping:
      - name: Populate with meaningful name from input
      - description: Create concise, informative description (no marketing fluff)
      - hardware extension: Extract manufacturer and model
      - software extension: Extract manufacturer, version, and licenseType

    7. Additional properties:
      - Do NOT use 'additionalProperties'
      - If something cannot be mapped, omit it

    8. Output format:
      - Output ONLY a pure JSON object compatible with the Asset schema
      - No prose, no Markdown, no code fences/backticks
      - No <think> tags or explanatory text
      - Just the JSON object


    Here is the given asset:

    {asset}


# Dapr subscriptions - receive events from topics
subscriptions:
  # harmonizing processing subscription
  harmonizingCreated:
    enabled: true
    topic: harmonizing.created
    route: /events/harmonizing
    pubsubname: pubsub
    metadata:
      queueName: harmonizing-processing-queue
      durable: "true"
      autoDelete: "false"
      prefetchCount: "10"
      consumerTag: harmonizing-processor

# Event publishing - send events to topics based on event type
eventPublishing:
  # Default pubsub component name
  defaultPubsubName: pubsub

  # Event type to topic mapping
  # Maps CloudEvent types to RabbitMQ topics for publishing
  # Supports two formats:
  #   1. Simple string: "event.type": "topic.name"
  #   2. Object with routing key: "event.type": {topic: "topic.name", routing_key: "routing.key"}
  topicMapping:
    # Agent output events
    # Simple format (topic only)

    # Advanced format with routing key for topic-based routing
    "harmonizing.validated":
      topic: "test.connection"
      routing_key: "valid"

    "harmonizing.invalidated":
      topic: "test.connection"
      routing_key: "invalid"

    "harmonizing.analysis.error":
      topic: "test.connection"
      routing_key: "error"
# Secrets
secrets:
  # AI Model API keys
  aiModel:
    # Create secret manually or use existing
    create: false
    existingSecret: "ai-model-secret"
    keys:
      openaiApiKey: openai_api_key
      vllmApiKey: vllm_api_key
      vllmBaseUrl: vllm_base_url

  # Data Gateway credentials
  dataGateway:
    create: false
    existingSecret: "data-gateway-secret"
    keys:
      apiKey: api_key
      baseUrl: base_url

# Service configuration
service:
  type: ClusterIP
  port: 8000
  annotations: {}

# Resource limits
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# Health checks
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1  # Only 1 successful probe needed to mark ready again

# Pod annotations
podAnnotations: {}

# Pod security context
# OpenShift will automatically set security context based on SCC
podSecurityContext: {}

# Container security context
# OpenShift will automatically set security context based on SCC
securityContext: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
