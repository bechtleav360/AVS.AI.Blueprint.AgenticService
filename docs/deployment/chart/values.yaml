# Default values for agent-blueprint
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.harbor.av360.org/bechtle-ios/bios-invoiceprocessor-agent
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Dapr configuration (using Dapr operator for automatic sidecar injection)
dapr:
  enabled: true
  appId: agent-invoiceprocessor
  appPort: 8000
  logLevel: info
  enableApiLogging: true
  enableMetrics: true
  metricsPort: 9090

  # Sidecar resource limits
  sidecar:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

# Application settings - will be converted to DYNACONF_ prefixed environment variables
appSettings:
  # Application
  app_name: "agent-invoiceprocessor"
  app_port: 8000
  log_level: "DEBUG"
  app_environment: "development"

  # AI Model
  ai_model_provider: "vllm"
  ai_model_name: "default"
  ai_model_base_url: "https://avs-vllm.q14.net/v1"
  ai_model_api_key: "6FEDGzTQd8Oea8OO4onA" # Set this to your actual API key
  ai_model_max_tokens: 3000
  ai_model_temperature: 0.1
  ai_model_timeout: 60
  ai_model_max_retries: 3

  # Observability
  otel_enabled: true
  otel_endpoint: "http://otel-collector.dev-bios-bechtle.svc:4317"
  otel_service_name: "agent-invoiceprocessor"

  # Data Gateway
  data_gateway_enabled: false
  data_gateway_base_url: ""
  data_gateway_timeout: 30
  data_gateway_max_retries: 3

  # RabbitMQ
  rabbitmq_host: "rabbitmq.dev-bios-bechtle.svc:5672"
  rabbitmq_vhost: "bios"

  # Health checks
  health_check_ai_provider: true
  health_check_rabbitmq: true

  # Prompt Configuration
  # Prompts are mounted from ConfigMap at /etc/agent/prompts
  # Using comma-separated string for Dynaconf compatibility
  prompt_search_paths: "/etc/agent/prompts"

# Agent configurations - each agent built with AgentBuilder in main.py
# These settings map to [runtime.{agent_name}] in settings.toml
agents:
  # Invoice analyzer agent
  invoice_analyzer:
    model_name: "default"
    temperature: 0.1
    max_tokens: 2000
    timeout: 60
    max_retries: 3

# Prompts configuration - each key becomes a .prompt file in the ConfigMap
# System prompts define the agent's role (used with .with_system_prompt_file())
# Instruction prompts are templates for specific tasks (used with PromptLoader.load_instruction_prompt())
prompts:
  # System prompt for invoice_analyzer agent
  # Referenced in main.py: .with_system_prompt_file("invoice_analyzer")
  invoice_analyzer: |
    You are an AI assistant specialized in invoice processing.
    Your task is to extract structured information from unstructured invoice text.

    Key responsibilities:
    - Extract invoice numbers, dates, and amounts accurately
    - Identify customer and vendor information
    - Parse line items with quantities and prices
    - Calculate totals and verify tax amounts
    - Flag any inconsistencies or missing information

    Be precise with numbers and dates. If information is unclear, indicate uncertainty.

  # Instruction prompt template for invoice processing
  # Used in handlers: PromptLoader.load_instruction_prompt("invoice_instruction", ...)
  invoice_instruction: |
    Analyze this invoice and extract the information:

    {invoice_text}

    Please extract all relevant invoice details including:
    - Invoice number and date
    - Customer information (name, address, contact)
    - Vendor information
    - Line items with:
      * Description
      * Quantity
      * Unit price
      * Total price
    - Subtotal, tax amount, and total
    - Payment terms and due date
    - Any special notes or conditions

    Use the calculate_invoice tool to verify the calculations.

# Dapr subscriptions - receive events from topics
subscriptions:
  # Invoice processing subscription
  invoiceCreated:
    enabled: true
    topic: invoice.created
    route: /events/invoice
    pubsubname: pubsub
    metadata:
      queueName: invoice-processing-queue
      durable: "true"
      autoDelete: "false"
      prefetchCount: "10"
      consumerTag: invoice-processor

# Event publishing - send events to topics based on event type
eventPublishing:
  # Default pubsub component name
  defaultPubsubName: pubsub

  # Event type to topic mapping
  # Maps CloudEvent types to RabbitMQ topics for publishing
  # Supports two formats:
  #   1. Simple string: "event.type": "topic.name"
  #   2. Object with routing key: "event.type": {topic: "topic.name", routing_key: "routing.key"}
  topicMapping:
    # Agent output events
    # Simple format (topic only)

    # Advanced format with routing key for topic-based routing
    "invoice.validated":
      topic: "test.connection"
      routing_key: "valid"

    "invoice.invalidated":
      topic: "test.connection"
      routing_key: "invalid"

    "invoice.analysis.error":
      topic: "test.connection"
      routing_key: "error"
# Secrets
secrets:
  # AI Model API keys
  aiModel:
    # Create secret manually or use existing
    create: false
    existingSecret: "ai-model-secret"
    keys:
      openaiApiKey: openai_api_key
      vllmApiKey: vllm_api_key
      vllmBaseUrl: vllm_base_url

  # Data Gateway credentials
  dataGateway:
    create: false
    existingSecret: "data-gateway-secret"
    keys:
      apiKey: api_key
      baseUrl: base_url

# Service configuration
service:
  type: ClusterIP
  port: 8000
  annotations: {}

# Resource limits
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# Health checks
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1  # Only 1 successful probe needed to mark ready again

# Pod annotations
podAnnotations: {}

# Pod security context
# OpenShift will automatically set security context based on SCC
podSecurityContext: {}

# Container security context
# OpenShift will automatically set security context based on SCC
securityContext: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
