# Default values for agent-blueprint
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.harbor.av360.org/bechtle-ios/bios-invoiceprocessor-agent
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Dapr configuration
dapr:
  enabled: true
  appId: agent-invoiceprocessor
  appPort: 8000
  httpPort: 3500
  grpcPort: 50001
  metricsPort: 9090
  logLevel: info
  enableProfiling: false
  enableApiLogging: true
  httpMaxRequestSize: 4
  httpReadBufferSize: 4
  enableMetrics: true

  # Dapr mode: "standalone" or "kubernetes"
  mode: standalone

  # Use Dapr CRDs (requires Dapr operator and CRDs installed)
  # Set to false to use local component files mounted via ConfigMap
  useCRDs: false

  # Dapr sidecar image (manual injection without operator)
  image:
    repository: daprio/daprd
    tag: "latest"
    pullPolicy: IfNotPresent

  # Dapr control plane addresses (optional, only if you have Dapr control plane installed)
  # Leave empty for standalone mode
  controlPlaneAddress: "" # e.g., "dapr-api.dapr-system.svc.cluster.local:80"
  placementHostAddress: "" # e.g., "dapr-placement-server.dapr-system.svc.cluster.local:50006"
  sentryAddress: "" # e.g., "dapr-sentry.dapr-system.svc.cluster.local:80"
  config: "" # Dapr configuration name

  sidecar:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

# Application settings - will be converted to DYNACONF_ prefixed environment variables
appSettings:
  # Application
  app_name: "agent-invoiceprocessor"
  app_port: 8000
  log_level: "DEBUG"
  app_environment: "development"

  # AI Model
  ai_model_provider: "vllm"
  ai_model_name: "default"
  ai_model_base_url: "https://avs-vllm.q14.net/v1"
  ai_model_api_key: "6FEDGzTQd8Oea8OO4onA" # Set this to your actual API key
  ai_model_max_tokens: 3000
  ai_model_temperature: 0.1
  ai_model_timeout: 60
  ai_model_max_retries: 3

  # Observability
  otel_enabled: true
  otel_endpoint: "http://otel-collector:4317"
  otel_service_name: "agent-invoiceprocessor"

  # Data Gateway
  data_gateway_enabled: false
  data_gateway_base_url: ""
  data_gateway_timeout: 30
  data_gateway_max_retries: 3
  
  # Health checks
  health_check_ai_provider: false

# Multi-runtime configuration
runtimes:
  # Invoice analyzer runtime
  invoiceAnalyzer:
    enabled: true
    systemPromptName: invoice_system
    instructionPromptName: invoice_instruction
    aiModelName: default
    aiModelTemperature: 0.1
    aiModelMaxTokens: 2000

  # Document classifier runtime
  documentClassifier:
    enabled: false
    systemPromptName: document_classifier_system
    instructionPromptName: document_classifier_instruction
    aiModelName: default
    aiModelTemperature: 0.1
    aiModelMaxTokens: 1000

  # Summarizer runtime
  summarizer:
    enabled: false
    systemPromptName: summarizer_system
    instructionPromptName: summarizer_instruction
    aiModelName: default
    aiModelTemperature: 0.3
    aiModelMaxTokens: 1500

# Prompts configuration - each key becomes a .prompt file in the ConfigMap
prompts:
  invoice_system: |
    You are an AI assistant specialized in invoice processing.
    Your task is to extract structured information from unstructured invoice text.

    Key responsibilities:
    - Extract invoice numbers, dates, and amounts accurately
    - Identify customer and vendor information
    - Parse line items with quantities and prices
    - Calculate totals and verify tax amounts
    - Flag any inconsistencies or missing information

    Be precise with numbers and dates. If information is unclear, indicate uncertainty.

  invoice_instruction: |
    Analyze this invoice and extract the information:

    {invoice_text}

    Please extract all relevant invoice details including:
    - Invoice number and date
    - Customer information (name, address, contact)
    - Vendor information
    - Line items with:
      * Description
      * Quantity
      * Unit price
      * Total price
    - Subtotal, tax amount, and total
    - Payment terms and due date
    - Any special notes or conditions

    Use the calculate_invoice tool to verify the calculations.

# Dapr components
daprComponents:
  # RabbitMQ pub/sub
  rabbitmq:
    enabled: true
    # IMPORTANT: Override this with your actual RabbitMQ connection string
    # Format: amqp://username:password@host:port/vhost
    host: "amqp://default_user_gL_0b5UoGT7HlwnDWib:HJ7PBBqNljN4KWMsXOtQ97LPuqaX7pBb@rabbitmq.dev-bios-bechtle.svc:5672/bios"
    vhost: "bios"
    consumerID: "agent-invoiceprocessor"
    durable: true
    autoAck: false
    deliveryMode: 2
    reconnectWait: 5
    prefetchCount: 10
    exchangeKind: "topic"
    publisherConfirm: true
    # Use existing secret for credentials (not currently used with local components)
    existingSecret: ""
    secretKeys:
      host: connection_string

# Dapr subscriptions - generic structure for any number of subscriptions
subscriptions:
  # Invoice processing subscription
  invoiceCreated:
    enabled: true
    topic: invoice.created
    route: /events/invoice
    pubsubname: rabbitmq-pubsub
    metadata:
      queueName: invoice-processing-queue
      durable: "true"
      autoDelete: "false"
      prefetchCount: "10"
      consumerTag: invoice-processor

  # Document classification subscription
  documentUploaded:
    enabled: true
    topic: document.uploaded
    route: /events/document
    pubsubname: rabbitmq-pubsub
    metadata:
      queueName: document-classification-queue
      durable: "true"
      autoDelete: "false"
      prefetchCount: "5"
      consumerTag: document-classifier

  # Invoice validation subscription
  invoiceValidate:
    enabled: false
    topic: invoice.validate
    route: /events/validate
    pubsubname: rabbitmq-pubsub
    deadLetterTopic: invoice.validate.deadletter
    metadata:
      queueName: invoice-validation-queue
      durable: "true"
      prefetchCount: "20"

# Secrets
secrets:
  # AI Model API keys
  aiModel:
    # Create secret manually or use existing
    create: false
    existingSecret: "ai-model-secret"
    keys:
      openaiApiKey: openai_api_key
      vllmApiKey: vllm_api_key
      vllmBaseUrl: vllm_base_url

  # Data Gateway credentials
  dataGateway:
    create: false
    existingSecret: "data-gateway-secret"
    keys:
      apiKey: api_key
      baseUrl: base_url

# Service configuration
service:
  type: ClusterIP
  port: 8000
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: agent-blueprint.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: agent-blueprint-tls
  #    hosts:
  #      - agent-blueprint.example.com

# Resource limits
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30

# Health checks
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""
