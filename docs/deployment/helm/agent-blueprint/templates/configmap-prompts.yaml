apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-blueprint.fullname" . }}-prompts
  labels:
    {{- include "agent-blueprint.labels" . | nindent 4 }}
data:
  # System prompts
  {{- if .Values.runtimes.invoiceAnalyzer.enabled }}
  {{ .Values.runtimes.invoiceAnalyzer.systemPromptName }}.prompt: {{ .Values.prompts.invoiceSystem | quote }}
  {{- end }}
  
  {{- if .Values.runtimes.documentClassifier.enabled }}
  {{ .Values.runtimes.documentClassifier.systemPromptName }}.prompt: {{ .Values.prompts.classifierSystem | quote }}
  {{- end }}
  
  {{- if .Values.runtimes.summarizer.enabled }}
  {{ .Values.runtimes.summarizer.systemPromptName }}.prompt: {{ .Values.prompts.summarizerSystem | quote }}
  {{- end }}
  
  # Instruction prompts
  {{- if .Values.runtimes.invoiceAnalyzer.enabled }}
  {{ .Values.runtimes.invoiceAnalyzer.instructionPromptName }}.prompt: {{ .Values.prompts.invoiceInstruction | quote }}
  {{- end }}
  
  {{- if .Values.runtimes.documentClassifier.enabled }}
  {{ .Values.runtimes.documentClassifier.instructionPromptName }}.prompt: {{ .Values.prompts.classifierInstruction | quote }}
  {{- end }}
  
  {{- if .Values.runtimes.summarizer.enabled }}
  {{ .Values.runtimes.summarizer.instructionPromptName }}.prompt: {{ .Values.prompts.summarizerInstruction | quote }}
  {{- end }}
