apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-blueprint.fullname" . }}
  labels:
    {{- include "agent-blueprint.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agent-blueprint.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/settings: {{ include (print $.Template.BasePath "/configmap-settings.yaml") . | sha256sum }}
        checksum/prompts: {{ include (print $.Template.BasePath "/configmap-prompts.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "agent-blueprint.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agent-blueprint.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.appSettings.app_port }}
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "agent-blueprint.fullname" . }}-settings
        env:
          # Python settings
          - name: PYTHONUNBUFFERED
            value: "1"
        
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: prompts
          mountPath: /etc/agent/prompts
          readOnly: true
      {{- if .Values.dapr.enabled }}
      # Dapr sidecar container (manual injection)
      - name: daprd
        image: "{{ .Values.dapr.image.repository }}:{{ .Values.dapr.image.tag }}"
        imagePullPolicy: {{ .Values.dapr.image.pullPolicy }}
        command:
        - "/daprd"
        args:
        - --mode
        - {{ .Values.dapr.mode | default "kubernetes" }}
        - --dapr-http-port
        - {{ .Values.dapr.httpPort | quote }}
        - --dapr-grpc-port
        - {{ .Values.dapr.grpcPort | quote }}
        - --dapr-internal-grpc-port
        - "50002"
        - --app-port
        - {{ .Values.dapr.appPort | quote }}
        - --app-id
        - {{ .Values.dapr.appId | quote }}
        {{- if not .Values.dapr.useCRDs }}
        - --resources-path
        - /dapr/components
        {{- end }}
        {{- if .Values.dapr.controlPlaneAddress }}
        - --control-plane-address
        - {{ .Values.dapr.controlPlaneAddress | quote }}
        {{- end }}
        - --app-protocol
        - http
        {{- if .Values.dapr.config }}
        - --config
        - {{ .Values.dapr.config | quote }}
        {{- end }}
        - --log-level
        - {{ .Values.dapr.logLevel | quote }}
        - --app-max-concurrency
        - "-1"
        {{- if .Values.dapr.placementHostAddress }}
        - --placement-host-address
        - {{ .Values.dapr.placementHostAddress | quote }}
        {{- end }}
        {{- if .Values.dapr.sentryAddress }}
        - --sentry-address
        - {{ .Values.dapr.sentryAddress | quote }}
        {{- end }}
        - --enable-metrics
        - {{ .Values.dapr.enableMetrics | quote }}
        - --metrics-port
        - {{ .Values.dapr.metricsPort | quote }}
        - --dapr-http-max-request-size
        - {{ .Values.dapr.httpMaxRequestSize | quote }}
        - --dapr-http-read-buffer-size
        - {{ .Values.dapr.httpReadBufferSize | quote }}
        - --enable-api-logging
        - {{ .Values.dapr.enableApiLogging | quote }}
        {{- if .Values.dapr.enableProfiling }}
        - --enable-profiling
        {{- end }}
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- if .Values.daprComponents.rabbitmq.existingSecret }}
        - name: RABBITMQ_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: {{ .Values.daprComponents.rabbitmq.existingSecret }}
              key: {{ .Values.daprComponents.rabbitmq.secretKeys.host }}
        {{- end }}
        ports:
        - name: dapr-http
          containerPort: {{ .Values.dapr.httpPort }}
          protocol: TCP
        - name: dapr-grpc
          containerPort: {{ .Values.dapr.grpcPort }}
          protocol: TCP
        - name: dapr-internal
          containerPort: 50002
          protocol: TCP
        - name: dapr-metrics
          containerPort: {{ .Values.dapr.metricsPort }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /v1.0/healthz
            port: {{ .Values.dapr.httpPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /v1.0/healthz
            port: {{ .Values.dapr.httpPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.dapr.sidecar.resources | nindent 12 }}
        {{- if not .Values.dapr.useCRDs }}
        volumeMounts:
        - name: dapr-components
          mountPath: /dapr/components
          readOnly: true
        {{- end }}
      {{- end }}
      volumes:
      - name: prompts
        configMap:
          name: {{ include "agent-blueprint.fullname" . }}-prompts
      {{- if .Values.dapr.enabled }}
      {{- if not .Values.dapr.useCRDs }}
      - name: dapr-components
        configMap:
          name: {{ include "agent-blueprint.fullname" . }}-dapr-components
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
