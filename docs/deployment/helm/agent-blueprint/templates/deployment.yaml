apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-blueprint.fullname" . }}
  labels:
    {{- include "agent-blueprint.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agent-blueprint.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.dapr.enabled }}
        dapr.io/enabled: "true"
        dapr.io/app-id: {{ .Values.dapr.appId | quote }}
        dapr.io/app-port: {{ .Values.dapr.appPort | quote }}
        dapr.io/http-port: {{ .Values.dapr.httpPort | quote }}
        dapr.io/grpc-port: {{ .Values.dapr.grpcPort | quote }}
        dapr.io/metrics-port: {{ .Values.dapr.metricsPort | quote }}
        dapr.io/log-level: {{ .Values.dapr.logLevel | quote }}
        dapr.io/enable-profiling: {{ .Values.dapr.enableProfiling | quote }}
        dapr.io/enable-api-logging: {{ .Values.dapr.enableApiLogging | quote }}
        dapr.io/http-max-request-size: {{ .Values.dapr.httpMaxRequestSize | quote }}
        dapr.io/http-read-buffer-size: {{ .Values.dapr.httpReadBufferSize | quote }}
        dapr.io/enable-metrics: {{ .Values.dapr.enableMetrics | quote }}
        dapr.io/sidecar-cpu-limit: {{ .Values.dapr.sidecar.resources.limits.cpu | quote }}
        dapr.io/sidecar-memory-limit: {{ .Values.dapr.sidecar.resources.limits.memory | quote }}
        dapr.io/sidecar-cpu-request: {{ .Values.dapr.sidecar.resources.requests.cpu | quote }}
        dapr.io/sidecar-memory-request: {{ .Values.dapr.sidecar.resources.requests.memory | quote }}
        {{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap-settings.yaml") . | sha256sum }}
        checksum/prompts: {{ include (print $.Template.BasePath "/configmap-prompts.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "agent-blueprint.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agent-blueprint.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.app.port }}
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: {{ .Values.app.environment | quote }}
        - name: APP_PORT
          value: {{ .Values.app.port | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.app.logLevel | quote }}
        
        # AI Model configuration
        - name: AI_MODEL_PROVIDER
          value: {{ .Values.app.aiModel.provider | quote }}
        - name: AI_MODEL_NAME
          value: {{ .Values.app.aiModel.name | quote }}
        - name: AI_MODEL_MAX_TOKENS
          value: {{ .Values.app.aiModel.maxTokens | quote }}
        - name: AI_MODEL_TEMPERATURE
          value: {{ .Values.app.aiModel.temperature | quote }}
        - name: AI_MODEL_TIMEOUT
          value: {{ .Values.app.aiModel.timeout | quote }}
        {{- if .Values.secrets.aiModel.existingSecret }}
        - name: AI_MODEL_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.aiModel.existingSecret }}
              key: {{ .Values.secrets.aiModel.keys.openaiApiKey }}
        {{- end }}
        
        # Observability
        {{- if .Values.app.observability.otelEnabled }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.app.observability.otelEndpoint | quote }}
        - name: OTEL_SERVICE_NAME
          value: {{ .Values.app.observability.otelServiceName | quote }}
        {{- end }}
        
        # Data Gateway (optional)
        {{- if .Values.app.dataGateway.enabled }}
        {{- if .Values.secrets.dataGateway.existingSecret }}
        - name: DATA_GATEWAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.dataGateway.existingSecret }}
              key: {{ .Values.secrets.dataGateway.keys.apiKey }}
        - name: DATA_GATEWAY_BASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.dataGateway.existingSecret }}
              key: {{ .Values.secrets.dataGateway.keys.baseUrl }}
        {{- end }}
        {{- end }}
        
        # Python settings
        - name: PYTHONUNBUFFERED
          value: "1"
        
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: prompts
          mountPath: /etc/agent/prompts
          readOnly: true
        - name: settings
          mountPath: /app/custom/settings.toml
          subPath: settings.toml
          readOnly: true
      volumes:
      - name: prompts
        configMap:
          name: {{ include "agent-blueprint.fullname" . }}-prompts
      - name: settings
        configMap:
          name: {{ include "agent-blueprint.fullname" . }}-settings
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
