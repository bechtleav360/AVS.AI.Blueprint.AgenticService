apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-blueprint.fullname" . }}-settings
  labels:
    {{- include "agent-blueprint.labels" . | nindent 4 }}
data:
  settings.toml: |
    [{{ .Values.app.environment }}]
    app_name = "{{ include "agent-blueprint.fullname" . }}"
    app_port = {{ .Values.app.port }}
    log_level = "{{ .Values.app.logLevel }}"
    
    # Prompt configuration
    prompt_directory = "/etc/agent/prompts"
    
    # AI Model configuration
    ai_model_provider = "{{ .Values.app.aiModel.provider }}"
    ai_model_name = "{{ .Values.app.aiModel.name }}"
    ai_model_max_tokens = {{ .Values.app.aiModel.maxTokens }}
    ai_model_temperature = {{ .Values.app.aiModel.temperature }}
    ai_model_timeout = {{ .Values.app.aiModel.timeout }}
    ai_model_max_retries = {{ .Values.app.aiModel.maxRetries }}
    
    {{- if .Values.app.observability.otelEnabled }}
    # Observability
    otel_enabled = true
    otel_service_name = "{{ .Values.app.observability.otelServiceName }}"
    otel_endpoint = "{{ .Values.app.observability.otelEndpoint }}"
    {{- end }}
    
    {{- if .Values.app.dataGateway.enabled }}
    # Data Gateway
    data_gateway_timeout = {{ .Values.app.dataGateway.timeout }}
    data_gateway_max_retries = {{ .Values.app.dataGateway.maxRetries }}
    {{- end }}
    
    # Multi-runtime configuration
    {{- if .Values.runtimes.invoiceAnalyzer.enabled }}
    [runtime.invoice_analyzer]
    system_prompt_name = "{{ .Values.runtimes.invoiceAnalyzer.systemPromptName }}"
    instruction_prompt_name = "{{ .Values.runtimes.invoiceAnalyzer.instructionPromptName }}"
    ai_model_name = "{{ .Values.runtimes.invoiceAnalyzer.aiModelName }}"
    ai_model_temperature = {{ .Values.runtimes.invoiceAnalyzer.aiModelTemperature }}
    ai_model_max_tokens = {{ .Values.runtimes.invoiceAnalyzer.aiModelMaxTokens }}
    {{- end }}
    
    {{- if .Values.runtimes.documentClassifier.enabled }}
    [runtime.document_classifier]
    system_prompt_name = "{{ .Values.runtimes.documentClassifier.systemPromptName }}"
    instruction_prompt_name = "{{ .Values.runtimes.documentClassifier.instructionPromptName }}"
    ai_model_name = "{{ .Values.runtimes.documentClassifier.aiModelName }}"
    ai_model_temperature = {{ .Values.runtimes.documentClassifier.aiModelTemperature }}
    ai_model_max_tokens = {{ .Values.runtimes.documentClassifier.aiModelMaxTokens }}
    {{- end }}
    
    {{- if .Values.runtimes.summarizer.enabled }}
    [runtime.summarizer]
    system_prompt_name = "{{ .Values.runtimes.summarizer.systemPromptName }}"
    instruction_prompt_name = "{{ .Values.runtimes.summarizer.instructionPromptName }}"
    ai_model_name = "{{ .Values.runtimes.summarizer.aiModelName }}"
    ai_model_temperature = {{ .Values.runtimes.summarizer.aiModelTemperature }}
    ai_model_max_tokens = {{ .Values.runtimes.summarizer.aiModelMaxTokens }}
    {{- end }}
