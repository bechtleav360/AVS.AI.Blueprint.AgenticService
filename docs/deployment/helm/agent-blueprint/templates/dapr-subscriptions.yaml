{{- if .Values.subscriptions.invoiceValidate.enabled }}
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: {{ include "agent-blueprint.fullname" . }}-invoice-validate
  labels:
    {{- include "agent-blueprint.labels" . | nindent 4 }}
spec:
  topic: {{ .Values.subscriptions.invoiceValidate.topic }}
  route: {{ .Values.subscriptions.invoiceValidate.route }}
  pubsubname: rabbitmq-pubsub
  {{- if .Values.subscriptions.invoiceValidate.deadLetterTopic }}
  deadLetterTopic: {{ .Values.subscriptions.invoiceValidate.deadLetterTopic }}
  {{- end }}
  metadata:
    - name: queueName
      value: {{ .Values.subscriptions.invoiceValidate.queueName }}
    - name: durable
      value: {{ .Values.subscriptions.invoiceValidate.durable | quote }}
    - name: prefetchCount
      value: {{ .Values.subscriptions.invoiceValidate.prefetchCount | quote }}
  scopes:
    - {{ .Values.dapr.appId }}
{{- end }}
{{- end }}
