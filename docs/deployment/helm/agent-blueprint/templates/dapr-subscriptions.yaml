{{- if .Values.dapr.enabled }}
{{- if .Values.subscriptions.invoiceCreated.enabled }}
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: {{ include "agent-blueprint.fullname" . }}-invoice-created
  labels:
    {{- include "agent-blueprint.labels" . | nindent 4 }}
spec:
  topic: {{ .Values.subscriptions.invoiceCreated.topic }}
  route: {{ .Values.subscriptions.invoiceCreated.route }}
  pubsubname: rabbitmq-pubsub
  metadata:
    - name: queueName
      value: {{ .Values.subscriptions.invoiceCreated.queueName }}
    - name: durable
      value: {{ .Values.subscriptions.invoiceCreated.durable | quote }}
    - name: autoDelete
      value: {{ .Values.subscriptions.invoiceCreated.autoDelete | quote }}
    - name: prefetchCount
      value: {{ .Values.subscriptions.invoiceCreated.prefetchCount | quote }}
    - name: consumerTag
      value: {{ .Values.subscriptions.invoiceCreated.consumerTag }}
  scopes:
    - {{ .Values.dapr.appId }}
{{- end }}

